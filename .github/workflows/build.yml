name: Build Razi Tasbeeh APK
on:
  push:
    branches: [ main ] # سيبدأ البناء بمجرد رفع الكود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # الموافقة التلقائية وبناء التطبيق
          echo y | flet build apk --product "Razi Tasbeeh"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Razi-Tasbeeh-Final
          path: build/apk/*.apk
